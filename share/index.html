<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloom</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100dvh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
  color:#fff;
  font-family:-apple-system,'SF Pro Display','SF Pro Text','Segoe UI','Roboto',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
}

.card{
  width:320px;
  background:#111;
  border:1px solid rgba(255,255,255,.07);
  border-radius:26px;
  overflow:hidden;
  padding:18px 18px 20px;
}

/* header */
.card-header{
  display:flex;
  align-items:center;
  gap:10px;
  padding-bottom:16px;
  border-bottom:1px solid rgba(255,255,255,.07);
  margin-bottom:16px;
}
.card-avatar{
  width:36px;height:36px;
  border-radius:50%;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.card-meta{display:flex;flex-direction:column;gap:1px;}
.card-name{font-size:13px;font-weight:700;color:#fff;letter-spacing:-.1px;}
.card-action{font-size:11px;color:rgba(255,255,255,.35);font-weight:400;}

/* cover */
.cover{
  width:100%;
  aspect-ratio:1;
  border-radius:14px;
  background:#1a1a1a;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:14px;
}
.cover img{width:100%;height:100%;object-fit:cover;display:block;}
.cover svg{opacity:.18;}

/* badge */
.badge{
  font-size:9px;font-weight:800;letter-spacing:.12em;
  color:rgba(255,255,255,.3);
  text-transform:uppercase;
  text-align:center;
  margin-bottom:5px;
}

/* text */
.track-title{
  font-size:20px;font-weight:700;
  text-align:center;line-height:1.25;
  color:#fff;
  margin-bottom:5px;
  padding:0 6px;
}
.track-artist{
  font-size:13px;color:rgba(255,255,255,.38);
  text-align:center;
  padding:0 6px;
  margin-bottom:18px;
}

/* footer */
.card-footer{
  display:flex;
  align-items:center;
  padding-top:16px;
  border-top:1px solid rgba(255,255,255,.07);
}
.footer-sc{
  font-size:12px;font-weight:500;color:rgba(255,255,255,.28);
  background:none;border:none;padding:0;cursor:pointer;
  transition:color .15s;
  text-align:left;
}
.footer-sc:hover{color:rgba(255,255,255,.6);}
.footer-open{
  margin-left:auto;
  width:38px;height:38px;
  border-radius:50%;
  background:#fff;
  color:#000;
  display:flex;align-items:center;justify-content:center;
  border:none;cursor:pointer;
  transition:opacity .15s,transform .12s;
  flex-shrink:0;
}
.footer-open:hover{opacity:.82;}
.footer-open:active{transform:scale(.93);}
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="card-avatar">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.7)" stroke-width="2.2" stroke-linecap="round">
        <path d="M9 18V5l12-2v13"/>
        <circle cx="6" cy="18" r="3"/>
        <circle cx="18" cy="16" r="3"/>
      </svg>
    </div>
    <div class="card-meta">
      <div class="card-name">Bloom</div>
      <div class="card-action" id="cardAction">shared a track</div>
    </div>
  </div>

  <div class="cover" id="cover">
    <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <path d="M9 18V5l12-2v13"/>
      <circle cx="6" cy="18" r="3"/>
      <circle cx="18" cy="16" r="3"/>
    </svg>
  </div>

  <div class="badge" id="badge" style="display:none"></div>
  <div class="track-title" id="title">Трек</div>
  <div class="track-artist" id="artist"></div>

  <div class="card-footer">
    <button class="footer-sc" id="scBtn" style="visibility:hidden" onclick="openSc()">Открыть на SoundCloud →</button>
    <button class="footer-open" onclick="tryOpen()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/>
        <polyline points="12 5 19 12 12 19"/>
      </svg>
    </button>
  </div>
</div>

<script>
(function(){
  var p = new URLSearchParams(location.search);
  var type      = p.get('type') || 'track';
  var permalink = p.get('permalink') || '';
  var cover     = p.get('cover')     || '';

  var mainTitle, subTitle, actionText, badgeText, bloomUrl;
  if (type === 'artist') {
    mainTitle  = p.get('name')   || 'Артист';
    subTitle   = '';
    actionText = 'shared an artist';
    badgeText  = 'АРТИСТ';
    bloomUrl   = 'bloom://artist?' + p.toString();
  } else if (type === 'playlist') {
    mainTitle  = p.get('title')  || 'Плейлист';
    subTitle   = p.get('artist') || '';
    actionText = 'shared a playlist';
    badgeText  = 'ПЛЕЙЛИСТ';
    bloomUrl   = 'bloom://playlist?' + p.toString();
  } else if (type === 'album') {
    mainTitle  = p.get('title')  || 'Альбом';
    subTitle   = p.get('artist') || '';
    actionText = 'shared an album';
    badgeText  = 'АЛЬБОМ';
    bloomUrl   = 'bloom://album?' + p.toString();
  } else {
    mainTitle  = p.get('title')  || 'Трек';
    subTitle   = p.get('artist') || '';
    actionText = 'shared a track';
    badgeText  = null;
    bloomUrl   = 'bloom://play?' + p.toString();
  }

  document.getElementById('cardAction').textContent = actionText;
  document.getElementById('title').textContent      = mainTitle;
  document.getElementById('artist').textContent     = subTitle;
  document.title = mainTitle + ' — Bloom';

  if (badgeText) {
    var b = document.getElementById('badge');
    b.textContent = badgeText;
    b.style.display = '';
  }

  if (cover) {
    var hires = cover.replace('-large.', '-t500x500.').replace('-small.', '-t500x500.');
    var img = new Image();
    img.onload = function() {
      document.getElementById('cover').innerHTML = '<img src="' + img.src + '" alt="">';
    };
    img.onerror = function() { if (img.src !== cover) img.src = cover; };
    img.src = hires;
  }

  if (permalink) {
    document.getElementById('scBtn').style.visibility = '';
  }

  window.tryOpen = function(){ window.location.href = bloomUrl; };
  window.openSc  = function(){ if (permalink) window.open(permalink, '_blank'); };

  tryOpen();
})();
</script>
</body>
</html>
