<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloom — открыть трек</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0e0e0f;
    color: #e8e8ea;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    width: 340px;
    background: #18181b;
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 18px;
    padding: 32px 28px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    box-shadow: 0 24px 64px rgba(0,0,0,.6);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 28px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg,#7c6df0,#a78bfa);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-name {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -.3px;
    color: #fff;
  }
  .track-cover {
    width: 100px; height: 100px;
    border-radius: 12px;
    background: #2a2a2e;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
    margin-bottom: 18px;
  }
  .track-cover img { width: 100%; height: 100%; object-fit: cover; }
  .track-cover svg { opacity: .3; }
  .track-title {
    font-size: 16px;
    font-weight: 700;
    text-align: center;
    line-height: 1.35;
    color: #fff;
    margin-bottom: 5px;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .track-artist {
    font-size: 13px;
    color: rgba(255,255,255,.45);
    text-align: center;
    margin-bottom: 26px;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .status {
    font-size: 13px;
    color: rgba(255,255,255,.38);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .dot {
    width: 6px; height: 6px;
    background: #7c6df0;
    border-radius: 50%;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100%{ opacity:1; transform:scale(1); }
    50%{ opacity:.35; transform:scale(.7); }
  }
  .btn {
    width: 100%;
    padding: 11px 0;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary {
    background: linear-gradient(135deg,#7c6df0,#a78bfa);
    color: #fff;
    margin-bottom: 10px;
  }
  .btn-primary:hover { opacity: .88; }
  .btn-secondary {
    background: rgba(255,255,255,.07);
    color: rgba(255,255,255,.65);
  }
  .btn-secondary:hover { background: rgba(255,255,255,.11); color: #fff; }
  .no-bloom {
    display: none;
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px solid rgba(255,255,255,.07);
    width: 100%;
    text-align: center;
  }
  .no-bloom p {
    font-size: 12px;
    color: rgba(255,255,255,.3);
    margin-bottom: 12px;
    line-height: 1.6;
  }
  .sc-link {
    font-size: 13px;
    color: #ff5500;
    text-decoration: none;
    font-weight: 500;
  }
  .sc-link:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round">
        <path d="M9 18V5l12-2v13"/>
        <circle cx="6" cy="18" r="3"/>
        <circle cx="18" cy="16" r="3"/>
      </svg>
    </div>
    <span class="logo-name">Bloom</span>
  </div>

  <div class="track-cover" id="cover">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
      <path d="M9 18V5l12-2v13"/>
      <circle cx="6" cy="18" r="3"/>
      <circle cx="18" cy="16" r="3"/>
    </svg>
  </div>

  <div class="track-title" id="title">Загрузка...</div>
  <div class="track-artist" id="artist"></div>

  <div class="status">
    <div class="dot"></div>
    <span id="statusText">Открываем в Bloom...</span>
  </div>

  <button class="btn btn-primary" onclick="tryOpen()">Открыть в Bloom</button>
  <button class="btn btn-secondary" onclick="showNoBloom()">Нет приложения</button>

  <div class="no-bloom" id="noBloom">
    <p>Bloom — бесплатный музыкальный плеер<br>для Windows с поддержкой SoundCloud.</p>
    <a id="scFallback" class="sc-link" href="#" target="_blank">Открыть на SoundCloud →</a>
  </div>
</div>

<script>
(function() {
  var params = new URLSearchParams(location.search);
  var scId    = params.get('scId')    || '';
  var permalink = params.get('permalink') || '';
  var title   = params.get('title')   || 'Трек';
  var artist  = params.get('artist')  || '';

  document.getElementById('title').textContent  = title;
  document.getElementById('artist').textContent = artist;

  var scLink = document.getElementById('scFallback');
  if (permalink) {
    scLink.href = permalink;
  } else {
    scLink.style.display = 'none';
  }

  var bloomUrl = 'bloom://play?' + params.toString();

  function tryOpen() {
    window.location.href = bloomUrl;
    // Если через 2с ничего не произошло — приложения нет
    setTimeout(function() {
      document.getElementById('statusText').textContent = 'Приложение не найдено';
      document.querySelector('.dot').style.background = '#e03030';
      document.getElementById('noBloom').style.display = 'block';
    }, 2000);
  }

  // Авторедирект сразу при открытии
  tryOpen();

  window.showNoBloom = function() {
    document.getElementById('noBloom').style.display = 'block';
    document.getElementById('statusText').textContent = 'Скачайте Bloom';
    document.querySelector('.dot').style.background = 'rgba(255,255,255,.3)';
    document.querySelector('.dot').style.animation = 'none';
  };

  window.tryOpen = tryOpen;
})();
</script>
</body>
</html>
